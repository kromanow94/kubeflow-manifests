apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

sortOptions:
  order: legacy
  legacySortOptions:
    orderFirst:
    - Namespace
    - ResourceQuota
    - StorageClass
    - CustomResourceDefinition
    - MutatingWebhookConfiguration
    - ServiceAccount
    - PodSecurityPolicy
    - Role
    - ClusterRole
    - RoleBinding
    - ClusterRoleBinding
    - ConfigMap
    - Secret
    - Endpoints
    - Service
    - LimitRange
    - PriorityClass
    - PersistentVolume
    - PersistentVolumeClaim
    - Deployment
    - StatefulSet
    - CronJob
    - PodDisruptionBudget
    orderLast:
    - ValidatingWebhookConfiguration

resources:
# Cert-Manager
- ../../common/cert-manager/cert-manager/base
- ../../common/cert-manager/kubeflow-issuer/base
# Istio
- ../../common/istio-1-17-oauth2-proxy/istio-crds/base
- ../../common/istio-1-17-oauth2-proxy/istio-namespace/base
- ../../common/istio-1-17-oauth2-proxy/istio-install/base
# oauth2-proxy
- ../../contrib/oauth2-proxy
# Dex
- ../../common/dex/overlays/oauth2-proxy
# KNative
- ../../common/knative/knative-serving/overlays/gateways
- ../../common/knative/knative-eventing/base
- ../../common/istio-1-17/cluster-local-gateway/base
# Kubeflow namespace
- ../../common/kubeflow-namespace/base
# Kubeflow Roles
- ../../common/kubeflow-roles/base
# Kubeflow Istio Resources
# - ../../common/istio-1-17/kubeflow-istio-resources/base
- ../../common/istio-1-17-oauth2-proxy/kubeflow-istio-resources/base


# Kubeflow Pipelines
- ../../apps/pipeline/upstream/env/cert-manager/platform-agnostic-multi-user
# - ../../apps/pipeline/upstream/env/cert-manager/platform-agnostic-multi-user-oauth2-proxy
# Katib
- ../../apps/katib/upstream/installs/katib-with-kubeflow
# Central Dashboard
# - ../../apps/centraldashboard/upstream/overlays/kserve
- ../../apps/centraldashboard/upstream/overlays/istio
# - ../../apps/centraldashboard/upstream/overlays/oauth2-proxy
# Admission Webhook
- ../../apps/admission-webhook/upstream/overlays/cert-manager
# Jupyter Web App
- ../../apps/jupyter/jupyter-web-app/upstream/overlays/istio
# Notebook Controller
- ../../apps/jupyter/notebook-controller/upstream/overlays/kubeflow
# Profiles + KFAM
- ../../apps/profiles/upstream/overlays/kubeflow
# - ../../apps/profiles/upstream/overlays/oauth2-proxy
# Volumes Web App
- ../../apps/volumes-web-app/upstream/overlays/istio
# Tensorboards Controller
-  ../../apps/tensorboard/tensorboard-controller/upstream/overlays/kubeflow
# Tensorboard Web App
-  ../../apps/tensorboard/tensorboards-web-app/upstream/overlays/istio
# Training Operator
- ../../apps/training-operator/upstream/overlays/kubeflow
# User namespace
- ../../common/user-namespace/base

# KServe
- ../../contrib/kserve/kserve
- ../../contrib/kserve/models-web-app/overlays/kubeflow
