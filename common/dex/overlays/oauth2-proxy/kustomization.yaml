apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: auth

resources:
- ../../base
# - virtual-service.yaml

patchesStrategicMerge:
- config-map.yaml
- deployment.yaml

configMapGenerator:
- name: dex-parameters
  # behavior: merge
  envs:
  - params.env

generatorOptions:
  disableNameSuffixHash: true

vars:
- name: issuer
  objref:
    kind: ConfigMap
    name: dex-parameters
    apiVersion: v1
  fieldref:
    fieldpath: data.issuer

- name: application_client_id
  objref:
    kind: ConfigMap
    name: dex-parameters
    apiVersion: v1
  fieldref:
    fieldpath: data.application_client_id

- name: application_client_secret
  objref:
    kind: ConfigMap
    name: dex-parameters
    apiVersion: v1
  fieldref:
    fieldpath: data.application_client_secret

- name: oidc_redirect_uris
  objref:
    kind: ConfigMap
    name: dex-parameters
    apiVersion: v1
  fieldref:
    fieldpath: data.oidc_redirect_uris

- name: DEX_SERVICE
  objref:
    kind: Service
    name: dex
    apiVersion: v1
  fieldref:
    fieldpath: metadata.name

- name: DEX_NAMESPACE
  objref:
    kind: Service
    name: dex
    apiVersion: v1
  fieldref:
    fieldpath: metadata.namespace

configurations:
- params.yaml
