apiVersion: install.istio.io/v1alpha1
kind: IstioOperator
spec:
  meshConfig:
    tcpKeepalive:
      time: 10s
      interval: 5s
      probes: 3
    extensionProviders:
    - name: oauth2-proxy
      envoyExtAuthzHttp:
        service: oauth2-proxy.oauth2-proxy.svc.cluster.local
        port: 80
        headersToDownstreamOnDeny: # headers sent back to the client when request is denied.
        - content-type
        - set-cookie
        headersToUpstreamOnAllow: # headers sent to backend application when request is allowed.
        - authorization
        - path
        - x-auth-request-email
        - x-auth-request-groups
        - x-auth-request-preferred-username
        - x-auth-request-user
        - x-auth-request-user-groups
        includeRequestHeadersInCheck: # headers sent to the oauth2-proxy in the check request.
        - authorization
        - cookie
  components:
    ingressGateways:
      # Cluster-local gateway for KFServing
      - enabled: true
        name: cluster-local-gateway
        # https://github.com/istio/istio/issues/19263#issuecomment-615833092
        label:
          app: cluster-local-gateway
          istio: cluster-local-gateway
        k8s:
          env:
          - name: ISTIO_META_ROUTER_MODE
            value: sni-dnat
          hpaSpec:
            maxReplicas: 5
            metrics:
            - resource:
                name: cpu
                target:
                  type: Utilization
                  averageUtilization: 80
              type: Resource
            minReplicas: 1
            scaleTargetRef:
              apiVersion: apps/v1
              kind: Deployment
              name: cluster-local-gateway
          resources:
            limits:
              cpu: 2000m
              memory: 1024Mi
            requests:
              cpu: 100m
              memory: 128Mi
          service:
            type: ClusterIP
            ports:
            - name: status-port
              port: 15020
              targetPort: 15020
            - name: http2
              port: 80
              targetPort: 8080

    # Disable EgressGateway
    egressGateways:
    - enabled: false
      name: istio-egressgateway
